<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pegasus 9.5 - Deriv Edition</title>

<style>
    :root{
        --bg:#0e0e0e;
        --panel:#1a1a1a;
        --card:#252525;
        --border:#333;
        --text:#e0e0e0;
        --accent:#00bcd4;
        --win:#4caf50;
        --loss:#f44336;
    }

    body{
        background:var(--bg);
        color:var(--text);
        font-family:Segoe UI,sans-serif;
        display:flex;
        justify-content:center;
        padding:20px;
    }

    .container{
        width:100%;
        max-width:850px;
    }

    .panel{
        background:var(--panel);
        border:1px solid var(--border);
        padding:20px;
        border-radius:10px;
        margin-bottom:20px;
    }

    .btn{
        border:none;
        padding:12px 20px;
        border-radius:5px;
        font-weight:bold;
        cursor:pointer;
        width:100%;
    }

    .btn-login{
        background:var(--accent);
        color:#000;
    }

    .btn-start{
        background:var(--win);
        color:#fff;
    }

    .btn-stop{
        background:var(--loss);
        color:#fff;
        display:none;
    }

    .stats{
        display:grid;
        grid-template-columns:repeat(4,1fr);
        gap:10px;
        margin:20px 0;
    }

    .card{
        background:var(--card);
        padding:10px;
        border-radius:5px;
        border:1px solid #444;
        text-align:center;
    }

    .card small{
        color:#888;
        display:block;
        margin-bottom:5px;
    }

    input{
        width:100%;
        padding:10px;
        background:#222;
        border:1px solid #444;
        color:#fff;
        border-radius:5px;
    }

    .grid{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:10px;
        margin-bottom:15px;
    }

    .logs{
        height:300px;
        overflow-y:auto;
        background:#000;
        border:1px solid #333;
        padding:10px;
        font-family:Courier New;
        font-size:12px;
        border-radius:5px;
    }

    .hidden{
        display:none;
    }

    .win{
        color:var(--win);
    }

    .loss{
        color:var(--loss);
    }

    .info{
        color:var(--accent);
    }
</style>
</head>
<body>

<div class="container">

    <!-- LOGIN -->
    <div id="auth-screen" class="panel">

        <h2 style="color:#00bcd4">
            Pegasus 9.5
        </h2>

        <p>
            Login necessário para acessar a Deriv.
        </p>

        <button id="btn-login" class="btn btn-login">
            LOGIN COM DERIV
        </button>

    </div>

    <!-- BOT -->
    <div id="bot-screen" class="hidden">

        <div class="panel">

            <h2 id="account-type">
                DESCONECTADO
            </h2>

            <div class="stats">

                <div class="card">
                    <small>SALDO</small>
                    <strong id="balance">$0.00</strong>
                </div>

                <div class="card">
                    <small>LUCRO</small>
                    <strong id="profit">$0.00</strong>
                </div>

                <div class="card">
                    <small>WINS</small>
                    <strong class="win" id="wins">0</strong>
                </div>

                <div class="card">
                    <small>LOSSES</small>
                    <strong class="loss" id="losses">0</strong>
                </div>

            </div>

            <div class="grid">

                <div>
                    <small>Stake Inicial</small>
                    <input type="number" id="stake" value="0.35" step="0.01">
                </div>

                <div>
                    <small>Meta Lucro</small>
                    <input type="number" id="takeProfit" value="5" step="0.01">
                </div>

            </div>

            <button id="btn-start" class="btn btn-start">
                INICIAR BOT
            </button>

            <button id="btn-stop" class="btn btn-stop">
                PARAR BOT
            </button>

            <br><br>

            <button id="btn-logout"
                    style="background:none;border:none;color:#777;cursor:pointer;">
                SAIR
            </button>

        </div>

        <div class="logs" id="logs"></div>

    </div>

</div>

<script>

//////////////////////////////////////////////////////
// CONFIG
//////////////////////////////////////////////////////

const APP_ID = 99999;
// TROQUE PELO SEU APP_ID

const REDIRECT_URL =
'https://rlpereira78.github.io/Pegasus_9_5/';

const WS_URL =
`wss://ws.derivws.com/websockets/v3?app_id=${APP_ID}`;

//////////////////////////////////////////////////////
// VARIÁVEIS
//////////////////////////////////////////////////////

let ws;
let token;

let running = false;

let stake = 0;
let currentStake = 0;
let takeProfit = 0;

let totalProfit = 0;

let wins = 0;
let losses = 0;

let proposalId = null;
let contractId = null;

//////////////////////////////////////////////////////
// LOGIN
//////////////////////////////////////////////////////

function login(){

    const url =
`https://oauth.deriv.com/oauth2/authorize?app_id=${APP_ID}&l=pt&redirect_uri=${encodeURIComponent(REDIRECT_URL)}`;

    window.location.href = url;
}

function logout(){

    localStorage.removeItem("deriv_token");

    location.href = location.pathname;
}

//////////////////////////////////////////////////////
// CHECK TOKEN
//////////////////////////////////////////////////////

function checkLogin(){

    const params =
        new URLSearchParams(window.location.search);

    const tokenFromUrl =
        params.get("token1") ||
        params.get("token");

    console.log(window.location.search);

    if(tokenFromUrl){

        localStorage.setItem(
            "deriv_token",
            tokenFromUrl
        );

        window.history.replaceState(
            {},
            document.title,
            window.location.pathname
        );
    }

    token = localStorage.getItem("deriv_token");

    if(token){

        document
            .getElementById("auth-screen")
            .classList.add("hidden");

        document
            .getElementById("bot-screen")
            .classList.remove("hidden");

        connectWS();
    }
}

//////////////////////////////////////////////////////
// WEBSOCKET
//////////////////////////////////////////////////////

function connectWS(){

    ws = new WebSocket(WS_URL);

    ws.onopen = () => {

        addLog("Conectando...", "info");

        ws.send(JSON.stringify({
            authorize: token
        }));
    };

    ws.onmessage = (msg) => {

        const data = JSON.parse(msg.data);

        console.log(data);

        //////////////////////////////////////////////
        // ERRO
        //////////////////////////////////////////////

        if(data.error){

            addLog(
                "ERRO: " + data.error.message,
                "loss"
            );

            return;
        }

        //////////////////////////////////////////////
        // AUTHORIZE
        //////////////////////////////////////////////

        if(data.msg_type === "authorize"){

            addLog(
                "Autorizado com sucesso",
                "win"
            );

            const isDemo =
                data.authorize.is_virtual;

            const label =
                document.getElementById("account-type");

            label.innerText =
                isDemo
                ? "CONTA DEMO"
                : "CONTA REAL";

            label.style.color =
                isDemo
                ? "#ff9800"
                : "#4caf50";

            //////////////////////////////////////////
            // BALANCE
            //////////////////////////////////////////

            ws.send(JSON.stringify({
                balance:1,
                subscribe:1
            }));
        }

        //////////////////////////////////////////////
        // BALANCE
        //////////////////////////////////////////////

        if(data.msg_type === "balance"){

            document.getElementById("balance")
            .innerText =
            "$" + data.balance.balance.toFixed(2);
        }

        //////////////////////////////////////////////
        // PROPOSAL
        //////////////////////////////////////////////

        if(data.msg_type === "proposal"){

            proposalId = data.proposal.id;

            buyContract();
        }

        //////////////////////////////////////////////
        // BUY
        //////////////////////////////////////////////

        if(data.msg_type === "buy"){

            contractId =
                data.buy.contract_id;

            addLog(
                `Contrato comprado: ${contractId}`,
                "info"
            );

            monitorContract();
        }

        //////////////////////////////////////////////
        // RESULTADO
        //////////////////////////////////////////////

        if(
            data.msg_type === "proposal_open_contract"
            &&
            data.proposal_open_contract.is_sold
        ){

            handleResult(
                data.proposal_open_contract
            );
        }
    };

    ws.onclose = () => {

        addLog(
            "Conexão encerrada",
            "loss"
        );
    };
}

//////////////////////////////////////////////////////
// START
//////////////////////////////////////////////////////

function startBot(){

    if(running) return;

    running = true;

    stake =
        parseFloat(
            document.getElementById("stake").value
        );

    currentStake = stake;

    takeProfit =
        parseFloat(
            document.getElementById("takeProfit").value
        );

    document.getElementById("btn-start")
    .style.display = "none";

    document.getElementById("btn-stop")
    .style.display = "block";

    addLog("BOT INICIADO", "win");

    createProposal();
}

//////////////////////////////////////////////////////
// STOP
//////////////////////////////////////////////////////

function stopBot(){

    running = false;

    document.getElementById("btn-start")
    .style.display = "block";

    document.getElementById("btn-stop")
    .style.display = "none";

    addLog("BOT PARADO", "loss");
}

//////////////////////////////////////////////////////
// PROPOSAL
//////////////////////////////////////////////////////

function createProposal(){

    if(!running) return;

    addLog(
        `Solicitando proposal $${currentStake}`,
        "info"
    );

    ws.send(JSON.stringify({

        proposal:1,

        amount:currentStake,

        basis:"stake",

        contract_type:"PUT",

        currency:"USD",

        duration:1,

        duration_unit:"t",

        symbol:"R_100"

    }));
}

//////////////////////////////////////////////////////
// BUY
//////////////////////////////////////////////////////

function buyContract(){

    ws.send(JSON.stringify({

        buy:proposalId,

        price:currentStake

    }));
}

//////////////////////////////////////////////////////
// MONITOR
//////////////////////////////////////////////////////

function monitorContract(){

    ws.send(JSON.stringify({

        proposal_open_contract:1,

        contract_id:contractId,

        subscribe:1

    }));
}

//////////////////////////////////////////////////////
// RESULTADO
//////////////////////////////////////////////////////

function handleResult(contract){

    const profit =
        parseFloat(contract.profit);

    totalProfit += profit;

    //////////////////////////////////////////////
    // WIN
    //////////////////////////////////////////////

    if(profit > 0){

        wins++;

        currentStake = stake;

        addLog(
            `WIN +$${profit.toFixed(2)}`,
            "win"
        );
    }

    //////////////////////////////////////////////
    // LOSS
    //////////////////////////////////////////////

    else{

        losses++;

        currentStake *= 2.1;

        addLog(
            `LOSS ${profit.toFixed(2)}`,
            "loss"
        );
    }

    //////////////////////////////////////////////
    // UPDATE UI
    //////////////////////////////////////////////

    updateUI();

    //////////////////////////////////////////////
    // TAKE PROFIT
    //////////////////////////////////////////////

    if(totalProfit >= takeProfit){

        addLog(
            "META BATIDA",
            "win"
        );

        stopBot();

        return;
    }

    //////////////////////////////////////////////
    // NOVA ENTRADA
    //////////////////////////////////////////////

    if(running){

        setTimeout(() => {

            createProposal();

        }, 2000);
    }
}

//////////////////////////////////////////////////////
// UPDATE UI
//////////////////////////////////////////////////////

function updateUI(){

    document.getElementById("profit")
    .innerText =
    "$" + totalProfit.toFixed(2);

    document.getElementById("wins")
    .innerText = wins;

    document.getElementById("losses")
    .innerText = losses;
}

//////////////////////////////////////////////////////
// LOG
//////////////////////////////////////////////////////

function addLog(msg,cls=""){

    const logs =
        document.getElementById("logs");

    const time =
        new Date().toLocaleTimeString();

    logs.innerHTML +=
    `<div class="${cls}">
        [${time}] ${msg}
    </div>`;

    logs.scrollTop =
        logs.scrollHeight;
}

//////////////////////////////////////////////////////
// EVENTS
//////////////////////////////////////////////////////

document
.getElementById("btn-login")
.addEventListener("click",login);

document
.getElementById("btn-logout")
.addEventListener("click",logout);

document
.getElementById("btn-start")
.addEventListener("click",startBot);

document
.getElementById("btn-stop")
.addEventListener("click",stopBot);

//////////////////////////////////////////////////////
// LOAD
//////////////////////////////////////////////////////

window.addEventListener("load", () => {

    console.log("Página carregada");

    checkLogin();
});

</script>

</body>
</html>
