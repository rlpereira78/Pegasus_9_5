<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLACK KNIGHT V3 - HYBRID REST/WS</title>
    <style>
        :root { --primary: #00ff00; --bg: #0a0a0a; --card: #161616; --error: #ff4444; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 500px; background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid #333; box-shadow: 0 10px 50px rgba(0,0,0,0.7); }
        h1 { text-align: center; color: var(--primary); font-size: 24px; letter-spacing: 5px; margin-bottom: 25px; text-transform: uppercase; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .status-box { background: #000; padding: 15px; text-align: center; font-weight: bold; margin-bottom: 20px; border-left: 5px solid var(--primary); border-radius: 4px; color: var(--primary); font-family: 'Consolas', monospace; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 5px; box-sizing: border-box; font-family: 'Consolas', monospace; outline: none; }
        input:focus { border-color: var(--primary); }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { width: 100%; padding: 18px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; text-transform: uppercase; background: var(--primary); color: #000; transition: 0.3s; margin-top: 10px; }
        button:hover { opacity: 0.8; transform: scale(0.98); }
        #log { margin-top: 20px; height: 160px; background: #000; font-size: 11px; padding: 12px; overflow-y: auto; border-radius: 8px; border: 1px solid #222; line-height: 1.6; }
        .stat-line { display: flex; justify-content: space-between; margin-top: 15px; font-size: 13px; font-weight: bold; border-top: 1px solid #333; padding-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>BLACK KNIGHT</h1>
    <div id="status" class="status-box">AGUARDANDO AUTENTICAÇÃO</div>

    <div class="form-group">
        <label>App ID (Registrado na Deriv)</label>
        <input type="text" id="appId" placeholder="Ex: 12345">
    </div>

    <div class="form-group">
        <label>Account ID (Real ou Demo)</label>
        <input type="text" id="accId" placeholder="Ex: CR123456 ou VRTC123456">
    </div>

    <div class="form-group">
        <label>Bearer Token (PAT)</label>
        <input type="password" id="token" placeholder="Cole seu Token aqui">
    </div>

    <div class="row">
        <div class="form-group">
            <label>Stake ($)</label>
            <input type="number" id="stake" value="0.35" step="0.01">
        </div>
        <div class="form-group">
            <label>Sequência</label>
            <input type="number" id="target" value="3">
        </div>
    </div>

    <button id="btnAction" onclick="iniciarFluxoV3()">AUTENTICAR REST & INICIAR WS</button>

    <div class="stat-line">
        <span>SALDO: <span id="balance">0.00</span></span>
        <span>LUCRO: <span id="profit">0.00</span></span>
    </div>

    <div id="log">Logs do sistema carregados...</div>
</div>

<script>
    let ws, isTrading = false, isRunning = false;
    let sequence = [];

    function addLog(msg, color = "#ccc") {
        const log = document.getElementById('log');
        const time = new Date().toLocaleTimeString();
        log.innerHTML = `<div style="color:${color}">[${time}] ${msg}</div>` + log.innerHTML;
    }

    // PASSO 1: FLUXO REST PARA OBTER OTP
    async function iniciarFluxoV3() {
        const appId = document.getElementById('appId').value.trim();
        const accId = document.getElementById('accId').value.trim();
        const token = document.getElementById('token').value.trim();

        if (!appId || !accId || !token) {
            alert("Por favor, preencha todos os campos de autenticação.");
            return;
        }

        addLog("Solicitando OTP via REST API...", "#00aaff");

        try {
            const response = await fetch(`https://api.derivws.com/trading/v1/options/accounts/${accId}/otp`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Deriv-App-Id': appId,
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                }
            });

            // Tratamento de erro de resposta (não-JSON)
            if (!response.ok) {
                const errorText = await response.text();
                addLog(`ERRO REST (${response.status}): ${errorText}`, "#ff4444");
                return;
            }

            const data = await response.json();

            if (data.ws_url) {
                addLog("OTP Gerado! Abrindo túnel WebSocket...", "#00ff00");
                conectarWS(data.ws_url);
            } else {
                addLog("Resposta REST inválida - URL não encontrada.", "#ffaa00");
            }

        } catch (err) {
            addLog("Falha Crítica: " + err.message, "#ff4444");
            console.error(err);
        }
    }

    // PASSO 2: CONEXÃO WEBSOCKET COM URL AUTENTICADA
    function conectarWS(url) {
        ws = new WebSocket(url);

        ws.onopen = () => {
            isRunning = true;
            addLog("Conexão WebSocket Ativa!", "#00ff00");
            document.getElementById('status').innerText = "CONECTADO: ANALISANDO";
            document.getElementById('btnAction').disabled = true;
            document.getElementById('btnAction').style.background = "#333";

            // Inscrições iniciais
            ws.send(JSON.stringify({ balance: 1, subscribe: 1 }));
            ws.send(JSON.stringify({ ticks: 'R_100', subscribe: 1 }));
        };

        ws.onmessage = (msg) => {
            const data = JSON.parse(msg.data);

            if (data.error) {
                addLog("ERRO WS: " + data.error.message, "#ff4444");
                return;
            }

            // Atualizar Saldo
            if (data.msg_type === 'balance') {
                document.getElementById('balance').innerText = data.balance.balance.toFixed(2);
            }

            // Lógica de Ticks
            if (data.msg_type === 'tick' && !isTrading) {
                const tick = data.tick.quote;
                const digit = tick.toString().slice(-1);
                const type = (parseInt(digit) % 2 === 0) ? 'P' : 'I';
                
                sequence.push(type);
                const limit = parseInt(document.getElementById('target').value);
                if (sequence.length > limit) sequence.shift();
                
                document.getElementById('status').innerText = `DÍGITOS: ${sequence.join(' | ')}`;

                if (sequence.length >= limit) {
                    if (sequence.every(v => v === 'P')) executarCompra('DIGITODD');
                    else if (sequence.every(v => v === 'I')) executarCompra('DIGITEVEN');
                }
            }

            // Confirmação de Compra
            if (data.msg_type === 'buy') {
                isTrading = true;
                addLog("Ordem executada no mercado.", "#00aaff");
            }

            // Resultado da Operação
            if (data.msg_type === 'proposal_open_contract' && data.proposal_open_contract.is_sold) {
                const profit = parseFloat(data.proposal_open_contract.profit);
                const lucroAtual = parseFloat(document.getElementById('profit').innerText) + profit;
                
                document.getElementById('profit').innerText = lucroAtual.toFixed(2);
                document.getElementById('profit').style.color = lucroAtual >= 0 ? "#00ff00" : "#ff4444";
                
                addLog(profit > 0 ? `WIN: +$${profit}` : `LOSS: $${profit}`, profit > 0 ? "#00ff00" : "#ff4444");
                
                isTrading = false;
                sequence = []; // Reset para próxima análise
            }
        };

        ws.onclose = () => {
            isRunning = false;
            addLog("WebSocket fechado. Recarregue para conectar.", "#ff4444");
            document.getElementById('status').innerText = "OFFLINE";
        };
    }

    function executarCompra(contrato) {
        if (isTrading) return;
        const stake = document.getElementById('stake').value;
        
        ws.send(JSON.stringify({
            buy: 1,
            price: parseFloat(stake),
            parameters: {
                amount: parseFloat(stake),
                basis: 'stake',
                contract_type: contrato,
                currency: 'USD',
                duration: 1,
                duration_unit: 't',
                symbol: 'R_100'
            }
        }));
    }
</script>
</body>
</html>
