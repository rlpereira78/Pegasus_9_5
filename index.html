<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLACK KNIGHT BOT - V2 (PAT SYSTEM)</title>
    <style>
        :root {
            --primary-color: #00ff00; --bg-color: #0a0a0a; --card-bg: #1a1a1a;
            --text-color: #ffffff; --danger-color: #ff4444; --info-color: #00aaff;
            --warning-color: #ffaa00;
        }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Consolas', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 100%; max-width: 550px; background: var(--card-bg); padding: 25px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        h1 { text-align: center; color: var(--primary-color); font-size: 22px; letter-spacing: 3px; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .status-bar { background: #000; padding: 12px; border-radius: 5px; margin-bottom: 10px; text-align: center; font-weight: bold; border-left: 5px solid var(--primary-color); }
        .form-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .input-box { display: flex; flex-direction: column; }
        .full-width { grid-column: span 2; }
        label { font-size: 11px; color: #aaa; margin-bottom: 4px; }
        input { background: #111; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 4px; outline: none; }
        input:focus { border-color: var(--primary-color); }
        button { width: 100%; padding: 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .btn-start { background: var(--primary-color); color: #000; }
        .btn-stop { background: var(--danger-color); color: #fff; display: none; }
        #log { margin-top: 20px; height: 150px; background: #050505; font-size: 11px; padding: 15px; overflow-y: auto; border-radius: 8px; border: 1px solid #222; }
        .stats { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-item { background: #000; padding: 10px; border-radius: 5px; text-align: center; border: 1px solid #222; }
    </style>
</head>
<body>

<div class="container">
    <h1>BLACK KNIGHT BOT</h1>
    <div id="statusBar" class="status-bar">SISTEMA AGUARDANDO PAT</div>

    <div class="form-group">
        <div class="input-box full-width">
            <label>API TOKEN (PAT DERIV 2.0)</label>
            <input type="password" id="apiToken" placeholder="Insira seu Token da Deriv">
        </div>
        <div class="input-box">
            <label>STAKE</label>
            <input type="number" id="stake" value="0.35" step="0.01">
        </div>
        <div class="input-box">
            <label>MARTINGALE</label>
            <input type="number" id="martingale" value="2.1" step="0.1">
        </div>
        <div class="input-box">
            <label>SEQUÊNCIA ALVO</label>
            <input type="number" id="sequence" value="3">
        </div>
        <div class="input-box">
            <label>STOP WIN ($)</label>
            <input type="number" id="stopwin" value="5.00">
        </div>
    </div>

    <button id="btnStart" class="btn-start" onclick="iniciarBot()">CONECTAR E OPERAR</button>
    <button id="btnStop" class="btn-stop" onclick="stopBot()">PARAR BOT</button>

    <div class="stats">
        <div class="stat-item">SALDO: <span id="statBalance" style="color: var(--info-color);">0.00</span></div>
        <div class="stat-item">LUCRO: <span id="statProfit">0.00</span></div>
    </div>

    <div id="log"></div>
</div>

<script>
    let ws, isRunning = false, isTrading = false;
    let initialStake, currentStake, martingale, targetSeq, stopWin, totalProfit = 0, recentDigits = [];

    // --- INJETANDO SUA LÓGICA DE SEGURANÇA (GERAÇÃO DE CHAVES) ---
    async function prepararSeguranca() {
        const array = crypto.getRandomValues(new Uint8Array(64));
        const codeVerifier = Array.from(array).map(v => 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~'[v % 66]).join('');
        const hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(codeVerifier));
        const codeChallenge = btoa(String.fromCharCode(...new Uint8Array(hash))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        
        sessionStorage.setItem('pkce_code_verifier', codeVerifier);
        addLog("Segurança PKCE Gerada com sucesso.", "info");
        return { codeVerifier, codeChallenge };
    }

    function addLog(msg, type = 'info') {
        const logDiv = document.getElementById('log');
        logDiv.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}<br>` + logDiv.innerHTML;
    }

    async function iniciarBot() {
        const token = document.getElementById('apiToken').value;
        if (!token) return alert("Insira seu PAT!");

        // Executa a sua lógica de segurança antes de conectar
        await prepararSeguranca();

        initialStake = parseFloat(document.getElementById('stake').value);
        currentStake = initialStake;
        martingale = parseFloat(document.getElementById('martingale').value);
        targetSeq = parseInt(document.getElementById('sequence').value);
        stopWin = parseFloat(document.getElementById('stopwin').value);

        // Conexão direta via WebSocket
        ws = new WebSocket('wss://ws.derivws.com/websockets/v3?app_id=1089');

        ws.onopen = () => {
            addLog("Conectando à Nova Deriv...");
            ws.send(JSON.stringify({ authorize: token }));
        };

        ws.onmessage = (msg) => {
            const data = JSON.parse(msg.data);
            if (data.error) { addLog("ERRO: " + data.error.message, "danger"); stopBot(); return; }

            if (data.msg_type === 'authorize') {
                isRunning = true;
                document.getElementById('btnStart').style.display = 'none';
                document.getElementById('btnStop').style.display = 'block';
                ws.send(JSON.stringify({ balance: 1, subscribe: 1 }));
                ws.send(JSON.stringify({ ticks: 'R_100', subscribe: 1 }));
                addLog("Autenticado! Analisando mercado...", "success");
            }

            if (data.msg_type === 'balance') document.getElementById('statBalance').innerText = data.balance.balance.toFixed(2);
            
            if (data.msg_type === 'tick' && isRunning && !isTrading) {
                const digit = parseInt(data.tick.quote.toString().slice(-1));
                const type = digit % 2 === 0 ? 'PAR' : 'IMPAR';
                recentDigits.push(type);
                if (recentDigits.length > targetSeq) recentDigits.shift();
                
                document.getElementById('statusBar').innerText = `ANALISANDO: ${recentDigits.join(' | ')}`;

                if (recentDigits.length >= targetSeq) {
                    if (recentDigits.every(v => v === 'PAR')) abrirOrdem('DIGITODD');
                    else if (recentDigits.every(v => v === 'IMPAR')) abrirOrdem('DIGITEVEN');
                }
            }

            if (data.msg_type === 'buy') {
                isTrading = true;
                ws.send(JSON.stringify({ proposal_open_contract: 1, contract_id: data.buy.contract_id, subscribe: 1 }));
            }

            if (data.msg_type === 'proposal_open_contract' && data.proposal_open_contract.is_sold) {
                const profit = parseFloat(data.proposal_open_contract.profit);
                totalProfit += profit;
                if (profit > 0) {
                    addLog(`WIN: +$${profit.toFixed(2)}`, "success");
                    currentStake = initialStake;
                    recentDigits = [];
                } else {
                    addLog(`LOSS: -$${Math.abs(profit).toFixed(2)}`, "danger");
                    currentStake = parseFloat((currentStake * martingale).toFixed(2));
                }
                document.getElementById('statProfit').innerText = totalProfit.toFixed(2);
                isTrading = false;
                if(totalProfit >= stopWin) stopBot();
            }
        };
    }

    function abrirOrdem(tipo) {
        isTrading = true;
        ws.send(JSON.stringify({
            buy: 1, price: currentStake,
            parameters: {
                amount: currentStake, basis: 'stake', contract_type: tipo,
                currency: 'USD', duration: 1, duration_unit: 't', symbol: 'R_100'
            }
        }));
    }

    function stopBot() {
        isRunning = false;
        if(ws) ws.close();
        document.getElementById('btnStop').style.display = 'none';
        document.getElementById('btnStart').style.display = 'block';
        document.getElementById('statusBar').innerText = "BOT PARADO";
    }
</script>
</body>
</html>
