<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pegasus 9.5 - Deriv Edition</title>
    <style>
        :root {
            --bg: #0e0e0e;
            --panel: #1a1a1a;
            --card: #252525;
            --border: #333;
            --text: #e0e0e0;
            --accent: #00bcd4;
            --win: #4caf50;
            --loss: #f44336;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 20px;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 850px; }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .btn {
            width: 100%;
            border: none;
            border-radius: 5px;
            padding: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn:hover { opacity: 0.9; }
        .btn-login { background: var(--accent); color: #000; }
        .btn-start { background: var(--win); color: #fff; }
        .btn-stop { background: var(--loss); color: #fff; display: none; }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .card {
            background: var(--card);
            border: 1px solid #444;
            border-radius: 5px;
            padding: 10px;
            text-align: center;
        }

        .card small { display: block; color: #999; margin-bottom: 5px; font-size: 10px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #444;
            background: #222;
            color: #fff;
        }

        .logs {
            height: 250px;
            overflow-y: auto;
            background: #000;
            border-radius: 5px;
            border: 1px solid #333;
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .hidden { display: none !important; }
        .win { color: var(--win); }
        .loss { color: var(--loss); }
        .info { color: var(--accent); }
    </style>
</head>

<body>

    <div class="container">
        <!-- TELA DE LOGIN -->
        <div id="auth-screen" class="panel">
            <h1 style="color:#00bcd4;">Pegasus 9.5</h1>
            <p>Conecte sua conta Deriv para começar a operar.</p>
            <button id="btn-login" class="btn btn-login">AUTENTICAR COM DERIV</button>
        </div>

        <!-- TELA DO BOT -->
        <div id="bot-screen" class="hidden">
            <div class="panel">
                <h2 id="account-type">VERIFICANDO...</h2>
                
                <div class="stats">
                    <div class="card"><small>SALDO</small><strong id="balance">$0.00</strong></div>
                    <div class="card"><small>LUCRO</small><strong id="profit">$0.00</strong></div>
                    <div class="card"><small>WINS</small><strong class="win" id="wins">0</strong></div>
                    <div class="card"><small>LOSSES</small><strong class="loss" id="losses">0</strong></div>
                </div>

                <div class="grid">
                    <div><small>Stake Inicial</small><input type="number" id="stake" value="0.35" step="0.01"></div>
                    <div><small>Meta de Lucro</small><input type="number" id="take-profit" value="5" step="0.01"></div>
                </div>

                <button id="btn-start" class="btn btn-start">INICIAR BOT</button>
                <button id="btn-stop" class="btn btn-stop">PARAR BOT</button>
                <button id="btn-logout" style="background:none; border:none; color:#777; cursor:pointer; margin-top:15px; width:100%;">SAIR DA CONTA</button>
            </div>

            <div id="logs" class="logs"></div>
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÃO ---
        // IMPORTANTE: Use apenas os números do seu App ID
        const APP_ID = 63632; // Substitua pelo seu ID real numérico
        const REDIRECT_URL = 'https://rlpereira78.github.io/Pegasus_9_5/';
        const WS_URL = `wss://ws.derivws.com/websockets/v3?app_id=${APP_ID}`;

        // --- VARIÁVEIS DE ESTADO ---
        let ws;
        let token;
        let running = false;
        let stake = 0.35;
        let currentStake = 0.35;
        let takeProfit = 5;
        let totalProfit = 0;
        let wins = 0;
        let losses = 0;
        let proposalId = null;

        // --- FUNÇÕES DE NAVEGAÇÃO ---
        function login() {
            const oauthUrl = `https://oauth.deriv.com/oauth2/authorize?app_id=${APP_ID}&l=pt`;
            window.location.href = oauthUrl;
        }

        function logout() {
            localStorage.removeItem("deriv_token");
            window.location.href = REDIRECT_URL;
        }

        // --- GERENCIAMENTO DE CONEXÃO ---
        function checkLogin() {
            const urlParams = new URLSearchParams(window.location.search);
            const tokenFromUrl = urlParams.get("token1");

            if (tokenFromUrl) {
                localStorage.setItem("deriv_token", tokenFromUrl);
                // Limpa a URL e recarrega para evitar problemas de loop
                window.history.replaceState({}, document.title, window.location.pathname);
            }

            token = localStorage.getItem("deriv_token");

            if (token) {
                document.getElementById("auth-screen").classList.add("hidden");
                document.getElementById("bot-screen").classList.remove("hidden");
                connectWebSocket();
            }
        }

        function connectWebSocket() {
            ws = new WebSocket(WS_URL);

            ws.onopen = () => {
                addLog("Conexão estabelecida. Autorizando...", "info");
                ws.send(JSON.stringify({ authorize: token }));
            };

            ws.onmessage = (msg) => {
                const data = JSON.parse(msg.data);

                if (data.error) {
                    addLog("ERRO: " + data.error.message, "loss");
                    if(data.error.code === 'InvalidToken') logout();
                    return;
                }

                switch (data.msg_type) {
                    case "authorize":
                        const acc = data.authorize;
                        document.getElementById("account-type").innerText = acc.is_virtual ? "CONTA DEMO" : "CONTA REAL";
                        document.getElementById("account-type").style.color = acc.is_virtual ? "#ff9800" : "#4caf50";
                        ws.send(JSON.stringify({ balance: 1, subscribe: 1 }));
                        addLog("Bot pronto para operar!", "win");
                        break;

                    case "balance":
                        document.getElementById("balance").innerText = `$${data.balance.balance.toFixed(2)}`;
                        break;

                    case "proposal":
                        proposalId = data.proposal.id;
                        if (running) buyContract();
                        break;

                    case "buy":
                        addLog(`Ordem enviada: ${data.buy.contract_id}`, "info");
                        ws.send(JSON.stringify({ proposal_open_contract: 1, contract_id: data.buy.contract_id, subscribe: 1 }));
                        break;

                    case "proposal_open_contract":
                        if (data.proposal_open_contract.is_sold) {
                            handleResult(data.proposal_open_contract);
                        }
                        break;
                }
            };

            ws.onclose = () => {
                addLog("Conexão perdida. Tentando reconectar...", "loss");
                setTimeout(connectWebSocket, 5000);
            };
        }

        // --- LÓGICA DO BOT ---
        function startBot() {
            if (running) return;
            
            stake = parseFloat(document.getElementById("stake").value);
            takeProfit = parseFloat(document.getElementById("take-profit").value);
            currentStake = stake;
            running = true;

            document.getElementById("btn-start").style.display = "none";
            document.getElementById("btn-stop").style.display = "block";
            
            addLog("Estratégia Iniciada...", "win");
            createProposal();
        }

        function stopBot() {
            running = false;
            document.getElementById("btn-start").style.display = "block";
            document.getElementById("btn-stop").style.display = "none";
            addLog("Bot solicitado para parar.", "loss");
        }

        function createProposal() {
            if (!running) return;
            ws.send(JSON.stringify({
                proposal: 1,
                amount: currentStake,
                basis: "stake",
                contract_type: "PUT",
                currency: "USD",
                duration: 1,
                duration_unit: "t",
                symbol: "R_100"
            }));
        }

        function buyContract() {
            if (!proposalId || !running) return;
            ws.send(JSON.stringify({ buy: proposalId, price: currentStake }));
            proposalId = null; 
        }

        function handleResult(contract) {
            const profit = parseFloat(contract.profit);
            totalProfit += profit;

            if (profit > 0) {
                wins++;
                currentStake = stake; // Reseta Martingale
                addLog(`WIN: +$${profit.toFixed(2)}`, "win");
            } else {
                losses++;
                currentStake *= 2.1; // Aplica Martingale
                addLog(`LOSS: $${profit.toFixed(2)}`, "loss");
            }

            updateUI();

            if (totalProfit >= takeProfit) {
                addLog("META ALCANÇADA!", "win");
                stopBot();
            } else if (running) {
                setTimeout(createProposal, 2000);
            }
        }

        function updateUI() {
            document.getElementById("profit").innerText = `$${totalProfit.toFixed(2)}`;
            document.getElementById("wins").innerText = wins;
            document.getElementById("losses").innerText = losses;
        }

        function addLog(msg, cls) {
            const logs = document.getElementById("logs");
            const now = new Date().toLocaleTimeString();
            logs.innerHTML += `<div class="${cls}">[${now}] ${msg}</div>`;
            logs.scrollTop = logs.scrollHeight;
        }

        // --- EVENTOS ---
        document.getElementById("btn-login").onclick = login;
        document.getElementById("btn-logout").onclick = logout;
        document.getElementById("btn-start").onclick = startBot;
        document.getElementById("btn-stop").onclick = stopBot;

        window.onload = checkLogin;
    </script>
</body>
</html>
