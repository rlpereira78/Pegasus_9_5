<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>BLACK KNIGHT - CONEXÃO DIRETA PAT</title>
    <style>
        body { background: #0a0a0a; color: #00ff00; font-family: monospace; padding: 20px; text-align: center; }
        .box { border: 1px solid #333; padding: 20px; border-radius: 10px; background: #111; max-width: 400px; margin: auto; }
        input { width: 90%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #444; color: #fff; }
        button { width: 95%; padding: 10px; background: #00ff00; color: #000; font-weight: bold; cursor: pointer; border: none; }
        #status { margin: 15px; color: #fff; }
        #log { font-size: 10px; color: #888; text-align: left; height: 100px; overflow-y: auto; border-top: 1px solid #333; padding-top: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h2>BLACK KNIGHT PAT</h2>
    <div id="status">STATUS: DESCONECTADO</div>
    
    <input type="text" id="token" placeholder="COLE SEU PAT AQUI">
    <button onclick="conectar()">CONECTAR AGORA</button>

    <div id="log"></div>
</div>

<script>
    let ws;

    function addLog(m) {
        const log = document.getElementById('log');
        log.innerHTML = `> ${m}<br>` + log.innerHTML;
    }

    function conectar() {
        const token = document.getElementById('token').value.trim();
        if (!token) return alert("Insira o Token!");

        addLog("Iniciando conexão direta...");

        // USANDO O ENDPOINT DA API V2 (Ainda aceita Authorize direto)
        // O App ID 1 é o ID padrão do sistema que aceita quase qualquer PAT
        ws = new WebSocket('wss://ws.binaryws.com/websockets/v3?app_id=1');

        ws.onopen = () => {
            addLog("Socket aberto. Enviando comando Authorize...");
            // É AQUI que a "mágica" acontece: Você envia o token direto.
            ws.send(JSON.stringify({ authorize: token }));
        };

        ws.onmessage = (msg) => {
            const data = JSON.parse(msg.data);

            if (data.error) {
                addLog("ERRO: " + data.error.message);
                return;
            }

            if (data.msg_type === 'authorize') {
                addLog("SUCESSO! Bem-vindo " + data.authorize.fullname);
                document.getElementById('status').innerText = "STATUS: AUTENTICADO";
                document.getElementById('status').style.color = "#00ff00";
                
                // Agora você pode pedir saldo, ticks, etc.
                ws.send(JSON.stringify({ balance: 1, subscribe: 1 }));
            }

            if (data.msg_type === 'balance') {
                addLog("Saldo Atual: " + data.balance.currency + " " + data.balance.balance);
            }
        };

        ws.onclose = () => {
            addLog("Conexão encerrada.");
            document.getElementById('status').innerText = "STATUS: OFFLINE";
        };
    }
</script>
</body>
</html>
