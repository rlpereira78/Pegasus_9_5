<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLACK KNIGHT - V2 PRO</title>
    <style>
        :root { --green: #00ff00; --bg: #0a0a0a; --card: #1a1a1a; --danger: #ff4444; }
        body { background: var(--bg); color: #fff; font-family: 'Consolas', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 95%; max-width: 500px; background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 0 40px #000; }
        h1 { text-align: center; color: var(--green); font-size: 22px; letter-spacing: 4px; margin: 0 0 20px 0; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .status-box { background: #000; padding: 15px; text-align: center; font-weight: bold; margin-bottom: 20px; border-left: 4px solid var(--green); color: var(--green); }
        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        input { background: #111; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 5px; outline: none; width: 100%; box-sizing: border-box; }
        input:focus { border-color: var(--green); }
        button { width: 100%; padding: 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .btn-start { background: var(--green); color: #000; }
        .btn-stop { background: var(--danger); color: #fff; display: none; }
        #log { margin-top: 15px; height: 150px; background: #050505; font-size: 11px; padding: 10px; overflow-y: auto; border: 1px solid #222; }
        .stats { display: flex; justify-content: space-between; margin-top: 15px; font-size: 13px; background: #000; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>BLACK KNIGHT</h1>
    <div id="status" class="status-box">SISTEMA OFFLINE</div>

    <input type="password" id="apiToken" placeholder="COLE SEU PAT (TOKEN) AQUI" style="margin-bottom: 15px;">

    <div class="input-group">
        <div>
            <label style="font-size: 9px; color: #777;">STAKE</label>
            <input type="number" id="stake" value="0.35" step="0.01">
        </div>
        <div>
            <label style="font-size: 9px; color: #777;">SEQUÊNCIA</label>
            <input type="number" id="target" value="3">
        </div>
    </div>

    <button id="btnAction" class="btn-start" onclick="toggleBot()">CONECTAR E INICIAR</button>
    <button id="btnStop" class="btn-stop" onclick="location.reload()">PARAR BOT</button>

    <div class="stats">
        <span>LUCRO: <b id="profit">0.00</b></span>
        <span>SALDO: <b id="balance">0.00</b></span>
    </div>

    <div id="log">Aguardando Token...</div>
</div>

<script>
    let ws, isRunning = false, isTrading = false;
    let sequence = [];

    // Lógica PKCE obrigatória integrada
    async function getPKCE() {
        const array = crypto.getRandomValues(new Uint8Array(64));
        const verifier = Array.from(array).map(v => 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~'[v % 66]).join('');
        const hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
        const challenge = btoa(String.fromCharCode(...new Uint8Array(hash))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        sessionStorage.setItem('pkce_code_verifier', verifier);
        return { verifier, challenge };
    }

    function addLog(msg, color = "#aaa") {
        const log = document.getElementById('log');
        const time = new Date().toLocaleTimeString();
        log.innerHTML = `<div style="color:${color}">[${time}] ${msg}</div>` + log.innerHTML;
    }

    async function toggleBot() {
        const token = document.getElementById('apiToken').value.trim();
        if (!token) return alert("Por favor, cole seu Token!");

        addLog("Iniciando segurança PKCE...", "#ffaa00");
        await getPKCE();

        // Usando App ID 1 para máxima compatibilidade com PAT
        ws = new WebSocket('wss://ws.binaryws.com/websockets/v3?app_id=1');

        ws.onopen = () => {
            addLog("Conectado ao servidor. Autenticando...");
            ws.send(JSON.stringify({ authorize: token }));
        };

        ws.onmessage = (msg) => {
            const data = JSON.parse(msg.data);

            if (data.error) {
                addLog("ERRO: " + data.error.message, "#ff4444");
                return;
            }

            if (data.msg_type === 'authorize') {
                isRunning = true;
                document.getElementById('btnAction').style.display = "none";
                document.getElementById('btnStop').style.display = "block";
                document.getElementById('status').innerText = "CONECTADO: ANALISANDO";
                addLog("Autenticação aceita!", "#00ff00");
                ws.send(JSON.stringify({ balance: 1, subscribe: 1 }));
                ws.send(JSON.stringify({ ticks: 'R_100', subscribe: 1 }));
            }

            if (data.msg_type === 'balance') {
                document.getElementById('balance').innerText = data.balance.balance.toFixed(2);
            }

            if (data.msg_type === 'tick' && isRunning && !isTrading) {
                const lastDigit = data.tick.quote.toString().slice(-1);
                const type = lastDigit % 2 === 0 ? 'P' : 'I';
                
                sequence.push(type);
                const limit = parseInt(document.getElementById('target').value);
                if (sequence.length > limit) sequence.shift();

                document.getElementById('status').innerText = `DÍGITOS: ${sequence.join(' | ')}`;

                if (sequence.length >= limit) {
                    if (sequence.every(v => v === 'P')) executeTrade('DIGITODD');
                    else if (sequence.every(v => v === 'I')) executeTrade('DIGITEVEN');
                }
            }

            if (data.msg_type === 'buy') {
                isTrading = true;
                addLog("Ordem enviada com sucesso!", "#00aaff");
                ws.send(JSON.stringify({ proposal_open_contract: 1, contract_id: data.buy.contract_id, subscribe: 1 }));
            }

            if (data.msg_type === 'proposal_open_contract' && data.proposal_open_contract.is_sold) {
                const profit = parseFloat(data.proposal_open_contract.profit);
                const currentProfit = parseFloat(document.getElementById('profit').innerText) + profit;
                document.getElementById('profit').innerText = currentProfit.toFixed(2);
                document.getElementById('profit').style.color = currentProfit >= 0 ? "#00ff00" : "#ff4444";
                
                addLog(profit > 0 ? `WIN: +$${profit}` : `LOSS: $${profit}`, profit > 0 ? "#00ff00" : "#ff4444");
                isTrading = false;
                sequence = []; // Reseta análise após a entrada
            }
        };

        ws.onclose = () => {
            addLog("Conexão encerrada.", "#ff4444");
            isRunning = false;
        };
    }

    function executeTrade(contractType) {
        if (isTrading) return;
        const stake = document.getElementById('stake').value;
        ws.send(JSON.stringify({
            buy: 1, price: stake,
            parameters: {
                amount: stake, basis: 'stake', contract_type: contractType,
                currency: 'USD', duration: 1, duration_unit: 't', symbol: 'R_100'
            }
        }));
    }
</script>
</body>
</html>
