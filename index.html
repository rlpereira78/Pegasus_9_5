<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deriv Bot - Anti-Block System</title>
    <style>
        :root { --bg: #0e0e0e; --panel: #161616; --accent: #00bcd4; --win: #4caf50; --loss: #f44336; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 900px; width: 100%; display: none; }
        .panel { background: var(--panel); border: 1px solid #333; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        
        /* Tela de Autenticação */
        #auth-screen { text-align: center; margin-top: 100px; }
        .btn-auth { background: var(--accent); color: #000; padding: 15px 30px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; }
        
        /* Dashboard */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .card { background: #222; padding: 15px; border-radius: 6px; text-align: center; border: 1px solid #333; }
        .card span { display: block; font-size: 11px; color: #888; margin-bottom: 5px; }
        .card strong { font-size: 20px; }

        /* Inputs */
        .input-group { margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; background: #252525; border: 1px solid #444; color: #fff; border-radius: 4px; box-sizing: border-box; }
        
        .btn-start { background: var(--win); color: white; width: 100%; padding: 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-stop { background: var(--loss); color: white; width: 100%; padding: 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; display: none; }
        
        .log-box { height: 250px; overflow-y: auto; background: #000; padding: 15px; font-family: monospace; font-size: 12px; border-radius: 4px; border: 1px solid #333; }
        .log-win { color: var(--win); }
        .log-loss { color: var(--loss); }
        .log-info { color: var(--accent); }
    </style>
</head>
<body>

<!-- TELA DE LOGIN -->
<div id="auth-screen">
    <div class="panel" style="max-width: 400px; margin: auto;">
        <h2 style="color: var(--accent)">CONEXÃO SEGURA</h2>
        <p>Clique abaixo para autenticar na Deriv e retornar.</p>
        <select id="acc-type" style="margin-bottom: 20px;">
            <option value="demo">CONTA DEMO (VIRTUAL)</option>
            <option value="real">CONTA REAL</option>
        </select>
        <button class="btn-auth" onclick="login()">AUTENTICAR E OPERAR</button>
    </div>
</div>

<!-- INTERFACE DO BOT -->
<div class="container" id="main-ui">
    <div class="panel">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 id="display-mode">BOT ONLINE</h2>
            <button onclick="logout()" style="background: #333; color: #ccc; border: none; padding: 5px 10px; cursor: pointer;">SAIR</button>
        </div>
        
        <div class="grid">
            <div class="card"><span>SALDO</span><strong id="val-balance">$ 0.00</strong></div>
            <div class="card"><span>LUCRO</span><strong id="val-profit">$ 0.00</strong></div>
            <div class="card"><span>WINS</span><strong id="val-wins" style="color:var(--win)">0</strong></div>
            <div class="card"><span>LOSS</span><strong id="val-loss" style="color:var(--loss)">0</strong></div>
        </div>
    </div>

    <div class="panel">
        <div class="grid" style="grid-template-columns: 1fr 1fr 1fr;">
            <div class="input-group"><label>Stake</label><input type="number" id="stake" value="0.35"></div>
            <div class="input-group"><label>Meta</label><input type="number" id="tp" value="5.00"></div>
            <div class="input-group"><label>Stop</label><input type="number" id="sl" value="10.00"></div>
        </div>
        <button class="btn-start" id="btn-start" onclick="startBot()">INICIAR ONLY DOWNS</button>
        <button class="btn-stop" id="btn-stop" onclick="stopBot()">PARAR BOT</button>
    </div>

    <div class="log-box" id="logs">
        <div>Aguardando início...</div>
    </div>
</div>

<script>
    // CONFIGURAÇÃO CRÍTICA
    const MY_APP_ID = 1089; // TROQUE PELO SEU APP ID PARA EVITAR BLOQUEIO
    
    let socket = null, token = null, isRunning = false, trading = false;
    let balance = 0, profit = 0, wins = 0, loss = 0, stake = 0, initialStake = 0;

    // 1. INICIALIZAÇÃO E TRATAMENTO DE URL (ANTI-UNUSUAL ACTIVITY)
    function init() {
        const urlParams = new URLSearchParams(window.location.search);
        const token1 = urlParams.get('token1');

        if (token1) {
            localStorage.setItem('deriv_token', token1);
            // Redireciona para URL limpa para resetar o estado do navegador e evitar bloqueio
            window.location.href = window.location.pathname;
            return;
        }

        const savedToken = localStorage.getItem('deriv_token');
        if (savedToken) {
            token = savedToken;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
            const isDemo = token.toLowerCase().startsWith('d');
            document.getElementById('display-mode').innerText = isDemo ? "MODO VIRTUAL" : "MODO REAL";
            document.getElementById('display-mode').style.color = isDemo ? "#ff9800" : "#4caf50";
        }
    }

    // 2. LOGIN E LOGOUT
    function login() {
        const redirect = window.location.href;
        localStorage.removeItem('deriv_token');
        window.location.href = `https://oauth.deriv.com/oauth2/authorize?app_id=${MY_APP_ID}&l=pt&redirect_uri=${redirect}`;
    }

    function logout() {
        localStorage.removeItem('deriv_token');
        location.reload();
    }

    // 3. CONEXÃO WEBSOCKET COM DELAY DE SEGURANÇA
    function startBot() {
        if (isRunning) return;
        
        initialStake = parseFloat(document.getElementById('stake').value);
        stake = initialStake;
        isRunning = true;
        
        document.getElementById('btn-start').style.display = 'none';
        document.getElementById('btn-stop').style.display = 'block';
        
        addLog("Estabelecendo conexão segura com delay...", "info");

        // Delay de 2 segundos antes de abrir o socket para evitar o erro de 'Atividade Incomum'
        setTimeout(() => {
            socket = new WebSocket(`wss://ws.derivws.com/websockets/v3?app_id=${MY_APP_ID}`);
            
            socket.onopen = () => {
                socket.send(JSON.stringify({ authorize: token }));
            };

            socket.onmessage = (msg) => {
                const data = JSON.parse(msg.data);

                if (data.error) {
                    addLog("ERRO: " + data.error.message, "loss");
                    stopBot();
                    return;
                }

                if (data.msg_type === 'authorize') {
                    addLog("Autenticado! Iniciando DTrader...", "win");
                    socket.send(JSON.stringify({ balance: 1, subscribe: 1 }));
                    socket.send(JSON.stringify({ ticks: "R_100", subscribe: 1 }));
                }

                if (data.msg_type === 'balance') {
                    document.getElementById('val-balance').innerText = `$ ${data.balance.balance.toFixed(2)}`;
                }

                if (data.msg_type === 'tick' && isRunning && !trading) {
                    handleStrategy();
                }

                if (data.msg_type === 'buy') {
                    trading = true;
                    addLog("Ordem enviada: Queda (2 Tiques)", "info");
                    socket.send(JSON.stringify({ proposal_open_contract: 1, contract_id: data.buy.contract_id, subscribe: 1 }));
                }

                if (data.msg_type === 'proposal_open_contract' && data.proposal_open_contract.is_sold) {
                    checkResult(data.proposal_open_contract);
                }
            };
        }, 2000);
    }

    // 4. ESTRATÉGIA ONLY DOWNS (DTRADER)
    function handleStrategy() {
        // Envia a ordem direto para o servidor
        socket.send(JSON.stringify({
            buy: 1,
            price: stake,
            parameters: {
                amount: stake,
                basis: "stake",
                contract_type: "RUNLOW",
                currency: "USD",
                duration: 2,
                duration_unit: "t",
                symbol: "R_100"
            }
        }));
        trading = true; // Trava para não abrir várias ordens
    }

    function checkResult(contract) {
        const p = contract.profit;
        profit += p;

        if (p > 0) {
            wins++;
            stake = initialStake;
            addLog(`WIN: +$${p.toFixed(2)}`, "win");
        } else {
            loss++;
            stake *= 2.1; // Martingale
            addLog(`LOSS: $${p.toFixed(2)}`, "loss");
        }

        document.getElementById('val-profit').innerText = `$ ${profit.toFixed(2)}`;
        document.getElementById('val-wins').innerText = wins;
        document.getElementById('val-loss').innerText = loss;
        document.getElementById('val-profit').style.color = profit >= 0 ? "var(--win)" : "var(--loss)";

        // Trava de Meta/Stop
        if (profit >= parseFloat(document.getElementById('tp').value)) {
            addLog("META ATINGIDA!", "win");
            stopBot();
        } else if (profit <= (parseFloat(document.getElementById('sl').value) * -1)) {
            addLog("STOP LOSS ATINGIDO!", "loss");
            stopBot();
        } else {
            // Delay de respiro para o servidor antes da próxima ordem
            setTimeout(() => { trading = false; }, 1500);
        }
    }

    function stopBot() {
        isRunning = false;
        trading = false;
        if (socket) socket.close();
        document.getElementById('btn-start').style.display = 'block';
        document.getElementById('btn-stop').style.display = 'none';
        addLog("Bot parado.", "info");
    }

    function addLog(msg, type) {
        const box = document.getElementById('logs');
        const time = new Date().toLocaleTimeString();
        box.innerHTML += `<div class="log-${type}">[${time}] ${msg}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    init();
</script>
</body>
</html>
