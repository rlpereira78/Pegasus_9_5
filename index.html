<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Deriv - GitHub Edition</title>
    <style>
        :root { --bg: #0e0e0e; --accent: #00bcd4; --win: #4caf50; --loss: #f44336; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { max-width: 800px; width: 100%; }
        .panel { background: #1a1a1a; border: 1px solid #333; padding: 20px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        
        .btn { padding: 12px 25px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-auth { background: var(--accent); color: #000; font-size: 16px; }
        .btn-start { background: var(--win); color: #fff; width: 100%; margin-top: 10px; }
        .btn-stop { background: var(--loss); color: #fff; width: 100%; display: none; }
        
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; }
        .card { background: #252525; padding: 10px; border-radius: 4px; border: 1px solid #444; }
        .card small { display: block; font-size: 10px; color: #888; }
        
        .log-box { height: 200px; overflow-y: auto; background: #000; padding: 10px; font-family: monospace; font-size: 12px; text-align: left; border: 1px solid #333; }
        .hidden { display: none !important; }
        .win { color: var(--win); }
        .loss { color: var(--loss); }
    </style>
</head>
<body>

<div class="container">
    <!-- TELA 1: AUTENTICAÇÃO -->
    <div id="screen-auth" class="panel">
        <h2 style="color: var(--accent)">Autenticação Necessária</h2>
        <p>Clique abaixo para logar na Deriv. Você voltará automaticamente para cá.</p>
        <button class="btn btn-auth" onclick="login()">LOGAR COM DERIV</button>
    </div>

    <!-- TELA 2: OPERAÇÃO -->
    <div id="screen-bot" class="container hidden">
        <div class="panel">
            <h2 id="mode-text">Bot Conectado</h2>
            <div class="stats">
                <div class="card"><small>SALDO</small><strong id="ui-balance">$ 0.00</strong></div>
                <div class="card"><small>LUCRO</small><strong id="ui-profit">$ 0.00</strong></div>
                <div class="card"><small>WINS</small><strong class="win" id="ui-wins">0</strong></div>
                <div class="card"><small>LOSS</small><strong class="loss" id="ui-loss">0</strong></div>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;">
                <input type="number" id="stake" value="0.35" placeholder="Stake">
                <input type="number" id="tp" value="5.00" placeholder="Meta">
            </div>
            
            <button id="btn-start" class="btn btn-start" onclick="startTrading()">INICIAR BOT (ONLY DOWNS)</button>
            <button id="btn-stop" class="btn btn-stop" onclick="stopTrading()">PARAR BOT</button>
            <button onclick="logout()" style="background:none; border:none; color:#666; cursor:pointer; margin-top:15px;">Sair da Conta</button>
        </div>

        <div class="log-box" id="logs"></div>
    </div>
</div>

<script>
    // 1. CONFIGURAÇÃO (USE SEU APP_ID AQUI)
    const APP_ID = 1089; 
    const REDIRECT_URL = window.location.origin + window.location.pathname;

    let ws, token, isRunning = false, isWaiting = false;
    let balance = 0, profit = 0, wins = 0, losses = 0, currentStake = 0;

    // 2. LÓGICA DE REDIRECIONAMENTO
    function checkReturn() {
        const params = new URLSearchParams(window.location.search);
        const tokenFromUrl = params.get('token1');

        if (tokenFromUrl) {
            localStorage.setItem('deriv_token', tokenFromUrl);
            // Limpa a URL (remove o token da barra de endereço)
            window.history.replaceState({}, document.title, window.location.pathname);
            showBotInterface();
        } else if (localStorage.getItem('deriv_token')) {
            showBotInterface();
        }
    }

    function login() {
        // Redireciona para a Deriv
        const authUrl = `https://oauth.deriv.com/oauth2/authorize?app_id=${APP_ID}&l=pt&redirect_uri=${REDIRECT_URL}`;
        window.location.href = authUrl;
    }

    function logout() {
        localStorage.removeItem('deriv_token');
        location.reload();
    }

    function showBotInterface() {
        token = localStorage.getItem('deriv_token');
        document.getElementById('screen-auth').classList.add('hidden');
        document.getElementById('screen-bot').classList.remove('hidden');
        const isDemo = token.toLowerCase().startsWith('d');
        document.getElementById('mode-text').innerText = isDemo ? "CONTA VIRTUAL" : "CONTA REAL";
        document.getElementById('mode-text').style.color = isDemo ? "#ff9800" : "#4caf50";
    }

    // 3. CONEXÃO E TRADE
    function startTrading() {
        currentStake = parseFloat(document.getElementById('stake').value);
        isRunning = true;
        document.getElementById('btn-start').style.display = 'none';
        document.getElementById('btn-stop').style.display = 'block';

        ws = new WebSocket(`wss://ws.derivws.com/websockets/v3?app_id=${APP_ID}`);

        ws.onopen = () => {
            ws.send(JSON.stringify({ authorize: token }));
        };

        ws.onmessage = (msg) => {
            const data = JSON.parse(msg.data);

            if (data.msg_type === 'authorize') {
                addLog("Conectado com sucesso!", "win");
                ws.send(JSON.stringify({ balance: 1, subscribe: 1 }));
                ws.send(JSON.stringify({ ticks: "R_100", subscribe: 1 }));
            }

            if (data.msg_type === 'balance') {
                document.getElementById('ui-balance').innerText = `$ ${data.balance.balance.toFixed(2)}`;
            }

            if (data.msg_type === 'tick' && isRunning && !isWaiting) {
                executeOrder();
            }

            if (data.msg_type === 'buy') {
                isWaiting = true;
                ws.send(JSON.stringify({ proposal_open_contract: 1, contract_id: data.buy.contract_id, subscribe: 1 }));
            }

            if (data.msg_type === 'proposal_open_contract' && data.proposal_open_contract.is_sold) {
                handleResult(data.proposal_open_contract);
            }
        };
    }

    function executeOrder() {
        isWaiting = true;
        ws.send(JSON.stringify({
            buy: 1,
            price: currentStake,
            parameters: {
                amount: currentStake,
                basis: "stake",
                contract_type: "RUNLOW",
                currency: "USD",
                duration: 2,
                duration_unit: "t",
                symbol: "R_100"
            }
        }));
    }

    function handleResult(c) {
        const p = c.profit;
        profit += p;
        
        if (p > 0) {
            wins++;
            currentStake = parseFloat(document.getElementById('stake').value);
            addLog(`WIN: +$${p.toFixed(2)}`, "win");
        } else {
            losses++;
            currentStake *= 2.1;
            addLog(`LOSS: -$${Math.abs(p).toFixed(2)}`, "loss");
        }

        updateStats();
        
        // Pequena pausa para evitar o erro de "Unusual Activity" entre as ordens
        setTimeout(() => { isWaiting = false; }, 2000);
    }

    function updateStats() {
        document.getElementById('ui-profit').innerText = `$ ${profit.toFixed(2)}`;
        document.getElementById('ui-wins').innerText = wins;
        document.getElementById('ui-loss').innerText = losses;
    }

    function stopTrading() {
        isRunning = false;
        if(ws) ws.close();
        document.getElementById('btn-start').style.display = 'block';
        document.getElementById('btn-stop').style.display = 'none';
        addLog("Bot parado.", "");
    }

    function addLog(m, cl) {
        const b = document.getElementById('logs');
        b.innerHTML += `<div class="${cl}">[${new Date().toLocaleTimeString()}] ${m}</div>`;
        b.scrollTop = b.scrollHeight;
    }

    checkReturn();
</script>
</body>
</html>
