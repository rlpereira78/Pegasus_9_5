<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Pegasus 9.5 - Deriv Edition</title>
    <style>
        :root { --bg: #0e0e0e; --accent: #00bcd4; --win: #4caf50; --loss: #f44336; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { max-width: 800px; width: 100%; }
        .panel { background: #1a1a1a; border: 1px solid #333; padding: 20px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        
        .btn { padding: 12px 25px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-auth { background: var(--accent); color: #000; font-size: 16px; }
        .btn-start { background: var(--win); color: #fff; width: 100%; margin-top: 10px; }
        .btn-stop { background: var(--loss); color: #fff; width: 100%; display: none; }
        
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; }
        .card { background: #252525; padding: 10px; border-radius: 4px; border: 1px solid #444; }
        .card small { display: block; font-size: 10px; color: #888; }
        
        input[type="number"] { background: #222; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 4px; width: 80%; }
        
        .log-box { height: 250px; overflow-y: auto; background: #000; padding: 15px; font-family: 'Courier New', monospace; font-size: 12px; text-align: left; border: 1px solid #333; border-radius: 4px; }
        .hidden { display: none !important; }
        .win { color: var(--win); }
        .loss { color: var(--loss); }
        .info { color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <!-- TELA 1: AUTENTICAÇÃO -->
    <div id="screen-auth" class="panel">
        <h2 style="color: var(--accent)">Pegasus 9.5</h2>
        <p>Autenticação necessária para acessar o mercado.</p>
        <button id="btn-login" class="btn btn-auth">LOGAR COM DERIV</button>
    </div>

    <!-- TELA 2: OPERAÇÃO -->
    <div id="screen-bot" class="container hidden">
        <div class="panel">
            <h2 id="mode-text">Conectado</h2>
            <div class="stats">
                <div class="card"><small>SALDO</small><strong id="ui-balance">$ 0.00</strong></div>
                <div class="card"><small>LUCRO</small><strong id="ui-profit">$ 0.00</strong></div>
                <div class="card"><small>WINS</small><strong class="win" id="ui-wins">0</strong></div>
                <div class="card"><small>LOSS</small><strong class="loss" id="ui-loss">0</strong></div>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;">
                <div>
                    <small>Stake Inicial ($)</small><br>
                    <input type="number" id="stake" value="0.35" step="0.01">
                </div>
                <div>
                    <small>Meta de Lucro ($)</small><br>
                    <input type="number" id="tp" value="5.00" step="0.01">
                </div>
            </div>
            
            <button id="btn-start" class="btn btn-start">INICIAR BOT (ONLY DOWNS)</button>
            <button id="btn-stop" class="btn btn-stop">PARAR BOT</button>
            <br>
            <button id="btn-logout" style="background:none; border:none; color:#666; cursor:pointer; margin-top:15px;">Sair da Conta</button>
        </div>

        <div class="log-box" id="logs"></div>
    </div>
</div>

<script>
    /**
     * CONFIGURAÇÕES GERAIS
     */
    const APP_ID = 1089; 
    // Corrigido: URL agora é uma string (entre aspas)
    const REDIRECT_URL = 'https://rlpereira78.github.io/Pegasus_9_5/'; 

    let ws, token, isRunning = false, isWaiting = false;
    let balance = 0, profit = 0, wins = 0, losses = 0, currentStake = 0;
    let initialStake = 0, takeProfit = 0;

    /**
     * FUNÇÕES DE AUTENTICAÇÃO
     */
    function login() {
        const authUrl = `https://oauth.deriv.com/oauth2/authorize?app_id=${APP_ID}&l=pt&redirect_uri=${REDIRECT_URL}`;
        window.location.href = authUrl;
    }

    function logout() {
        localStorage.removeItem('deriv_token');
        window.location.href = window.location.origin + window.location.pathname;
    }

    function checkReturn() {
        const params = new URLSearchParams(window.location.search);
        const tokenFromUrl = params.get('token1');

        if (tokenFromUrl) {
            localStorage.setItem('deriv_token', tokenFromUrl);
            // Limpa os parâmetros da URL para segurança
            window.history.replaceState({}, document.title, window.location.pathname);
            showBotInterface();
        } else if (localStorage.getItem('deriv_token')) {
            showBotInterface();
        }
    }

    function showBotInterface() {
        token = localStorage.getItem('deriv_token');
        if (!token) return;

        document.getElementById('screen-auth').classList.add('hidden');
        document.getElementById('screen-bot').classList.remove('hidden');
        
        const isDemo = token.toLowerCase().startsWith('d');
        const modeLabel = document.getElementById('mode-text');
        modeLabel.innerText = isDemo ? "CONTA VIRTUAL" : "CONTA REAL";
        modeLabel.style.color = isDemo ? "#ff9800" : "#4caf50";

        // Conecta o WS apenas para pegar o saldo inicial
        initWebSocket();
    }

    function initWebSocket() {
        if (ws && ws.readyState === WebSocket.OPEN) return;
        
        ws = new WebSocket(`wss://ws.derivws.com/websockets/v3?app_id=${APP_ID}`);

        ws.onopen = () => {
            ws.send(JSON.stringify({ authorize: token }));
        };

        ws.onmessage = (msg) => {
            const data = JSON.parse(msg.data);

            if (data.msg_type === 'authorize') {
                addLog("Conectado com sucesso!", "info");
                ws.send(JSON.stringify({ balance: 1, subscribe: 1 }));
            }

            if (data.msg_type === 'balance') {
                document.getElementById('ui-balance').innerText = `$ ${data.balance.balance.toFixed(2)}`;
            }

            if (data.msg_type === 'buy') {
                addLog(`Ordem enviada: $${currentStake.toFixed(2)}`, "");
            }

            if (data.msg_type === 'proposal_open_contract' && data.proposal_open_contract.is_sold) {
                handleResult(data.proposal_open_contract);
            }
            
            if (data.error) {
                addLog(`Erro: ${data.error.message}`, "loss");
                stopTrading();
            }
        };

        ws.onclose = () => {
            if(isRunning) {
                addLog("Conexão perdida. Reconectando...", "loss");
                setTimeout(initWebSocket, 2000);
            }
        };
    }

    /**
     * LÓGICA DO BOT
     */
    function startTrading() {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            initWebSocket();
        }
        
        initialStake = parseFloat(document.getElementById('stake').value);
        takeProfit = parseFloat(document.getElementById('tp').value);
        currentStake = initialStake;
        
        isRunning = true;
        isWaiting = false;

        document.getElementById('btn-start').style.display = 'none';
        document.getElementById('btn-stop').style.display = 'block';

        addLog("Iniciando operações...", "info");
        executeOrder();
    }

    function executeOrder() {
        if (!isRunning || isWaiting) return;
        
        isWaiting = true;
        ws.send(JSON.stringify({
            buy: 1,
            price: currentStake,
            parameters: {
                amount: currentStake,
                basis: "stake",
                contract_type: "RUNLOW",
                currency: "USD",
                duration: 1,
                duration_unit: "t",
                symbol: "R_100"
            }
        }));
        
        // Subscreve para receber o resultado do contrato
        ws.send(JSON.stringify({ proposal_open_contract: 1, subscribe: 1 }));
    }

    function handleResult(contract) {
        const p = parseFloat(contract.profit);
        profit += p;
        
        if (p > 0) {
            wins++;
            currentStake = initialStake;
            addLog(`WIN: +$${p.toFixed(2)}`, "win");
        } else {
            losses++;
            currentStake *= 2.1; // Multiplicador Martingale
            addLog(`LOSS: -$${Math.abs(p).toFixed(2)}`, "loss");
        }

        updateStats();

        if (profit >= takeProfit) {
            addLog("🎯 META ATINGIDA!", "win");
            stopTrading();
            return;
        }

        setTimeout(() => { 
            if(isRunning) {
                isWaiting = false;
                executeOrder();
            }
        }, 1500);
    }

    function stopTrading() {
        isRunning = false;
        isWaiting = false;
        document.getElementById('btn-start').style.display = 'block';
        document.getElementById('btn-stop').style.display = 'none';
        addLog("Bot parado.", "info");
    }

    function updateStats() {
        document.getElementById('ui-profit').innerText = `$ ${profit.toFixed(2)}`;
        document.getElementById('ui-wins').innerText = wins;
        document.getElementById('ui-loss').innerText = losses;
    }

    function addLog(m, cl) {
        const b = document.getElementById('logs');
        const time = new Date().toLocaleTimeString();
        b.innerHTML += `<div class="${cl}">[${time}] ${m}</div>`;
        b.scrollTop = b.scrollHeight;
    }

    // Event Listeners
    document.getElementById('btn-login').addEventListener('click', login);
    document.getElementById('btn-logout').addEventListener('click', logout);
    document.getElementById('btn-start').addEventListener('click', startTrading);
    document.getElementById('btn-stop').addEventListener('click', stopTrading);

    window.onload = checkReturn;

</script>
</body>
</html>
