<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SafeGuard v34.0 - Ultra Stable</title>
    <style>
        :root { --bg: #06090c; --card: #11171e; --yellow: #f0b90b; --green: #00ff95; --red: #ff3e3e; --blue: #00d4ff; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #eee; margin: 0; padding: 10px; display: flex; flex-direction: column; gap: 10px; height: 100vh; overflow: hidden; }
        .top-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; flex-shrink: 0; }
        .stat-card { background: var(--card); padding: 10px; border-radius: 8px; border: 1px solid #222; text-align: center; border-bottom: 3px solid #333; }
        .val { font-size: 18px; font-weight: bold; display: block; }
        .lab { font-size: 9px; color: #888; text-transform: uppercase; }
        .main-grid { display: grid; grid-template-columns: 280px 1fr 300px; gap: 10px; flex-grow: 1; min-height: 0; }
        .panel { background: var(--card); border-radius: 8px; padding: 12px; border: 1px solid #222; display: flex; flex-direction: column; gap: 8px; overflow: hidden; }
        .digit-big { font-size: 50px; font-weight: 900; text-align: center; color: var(--yellow); margin: 0; }
        .btn { padding: 10px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; font-size: 11px; }
        .btn-blue { background: var(--blue); color: #000; }
        .btn-start { background: var(--green); color: #000; }
        .btn-strategy { background: #000; color: var(--yellow); border: 1px solid var(--yellow); font-size: 10px; }
        .btn-reset { background: #333; color: #fff; font-size: 9px; margin-top: auto; }
        .chart { display: flex; align-items: flex-end; justify-content: space-around; flex-grow: 1; background: #000; padding: 10px; border-radius: 8px; gap: 4px; border: 1px solid #222; }
        .bar { width: 100%; background: var(--blue); min-height: 2px; transition: height 0.3s; border-radius: 2px; }
        .log { background: #000; color: #00ff00; font-family: monospace; font-size: 10px; flex-grow: 1; overflow-y: auto; padding: 8px; border-radius: 5px; }
        input { background: #161a1e; border: 1px solid #333; color: white; padding: 5px; border-radius: 4px; width: 100%; font-size: 12px; }
        label { font-size: 9px; color: #888; }
        .full-report { background: var(--card); border: 1px solid #222; border-radius: 8px; padding: 10px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; flex-shrink: 0; }
        .rep-box { text-align: center; border-right: 1px solid #222; }
        .rep-box:last-child { border-right: none; }
        .rep-v { display: block; font-size: 16px; font-weight: bold; color: var(--blue); }
        .rep-l { display: block; font-size: 9px; color: #888; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="top-stats">
    <div class="stat-card"><span class="lab">Banca Real</span><span class="val" id="banca">$ 0.00</span></div>
    <div class="stat-card"><span class="lab">Stake Próxima</span><span class="val" id="proxima" style="color:var(--yellow)">$ 0.00</span></div>
    <div class="stat-card"><span class="lab">Lucro Sessão</span><span class="val" id="lucro">$ 0.00</span></div>
    <div class="stat-card"><span class="lab">Perdas (L)</span><span class="val" id="perdas" style="color:var(--red)">0</span></div>
</div>

<div class="main-grid">
    <div class="panel">
        <div class="digit-big" id="current-digit">-</div>
        <button class="btn btn-strategy" id="btn-strat" onclick="toggleStrategy()">MODO: ÍMPAR (ODD)</button>
        <div id="pct" style="text-align:center; font-weight:bold; color:var(--blue); font-size:18px;">0%</div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px;">
            <div><label>STAKE</label><input type="number" id="inp-stake" value="0.35"></div>
            <div><label>FILTRO %</label><input type="number" id="inp-pct" value="60"></div>
            <div><label>META $</label><input type="number" id="inp-goal" value="1.00"></div>
            <div><label>STOP $</label><input type="number" id="inp-loss" value="10.00"></div>
        </div>
        <input type="password" id="inp-token" placeholder="Token API">
        <button class="btn btn-blue" onclick="conectar()" id="btn-conn">1. CONECTAR</button>
        <button class="btn btn-start" id="btn-o" onclick="iniciar()" disabled>2. OPERAR</button>
        <button class="btn btn-reset" onclick="resetTotal()">LIMPAR CACHE</button>
    </div>
    <div class="panel"><div class="chart" id="chart"></div></div>
    <div class="panel"><div class="log" id="log-area"></div></div>
</div>

<div class="full-report">
    <div class="rep-box"><span class="rep-l">Win Rate</span><span class="rep-v" id="rep-winrate" style="color:var(--green)">0%</span></div>
    <div class="rep-box"><span class="rep-l">Entradas</span><span class="rep-v" id="rep-total">0</span></div>
    <div class="rep-box"><span class="rep-l">Fator Lucro</span><span class="rep-v" id="rep-factor">0.00</span></div>
    <div class="rep-box"><span class="rep-l">Max Loss Seq.</span><span class="rep-v" id="rep-maxloss" style="color:var(--red)">0</span></div>
    <div class="rep-box"><span class="rep-l">Volume</span><span class="rep-v" id="rep-vol">$ 0.00</span></div>
    <div class="rep-box"><span class="rep-l">Tempo</span><span class="rep-v" id="rep-time">00:00</span></div>
</div>

<script>
    let ws = null, operando = false, isProcessing = false;
    let profit = 0, losses = 0, stake = 0.35, initStake = 0.35;
    let historico = [], estrategia = "DIGITODD"; 
    let r_wins = 0, r_total = 0, r_maxLoss = 0, r_curLoss = 0, r_vol = 0, r_brutoWin = 0, r_brutoLoss = 0;
    let startTime = null, timerInterval = null, aguardandoRecuperacao = false;

    function addLog(m, c="#0f0") {
        const l = document.getElementById('log-area');
        const div = document.createElement('div');
        div.style.cssText = `color:${c}; border-bottom:1px solid #111; padding:2px; font-size:10px;`;
        div.innerHTML = `[${new Date().toLocaleTimeString()}] ${m}`;
        l.prepend(div);
        if(l.children.length > 30) l.removeChild(l.lastChild);
    }

    function toggleStrategy(force = null) {
        const btn = document.getElementById('btn-strat');
        estrategia = force || (estrategia === "DIGITODD" ? "DIGITEVEN" : "DIGITODD");
        btn.innerText = estrategia === "DIGITODD" ? "MODO: ÍMPAR (ODD)" : "MODO: PAR (EVEN)";
        btn.style.color = estrategia === "DIGITODD" ? "var(--yellow)" : "var(--blue)";
        btn.style.borderColor = estrategia === "DIGITODD" ? "var(--yellow)" : "var(--blue)";
    }

    function initChart() {
        const chart = document.getElementById('chart');
        chart.innerHTML = '';
        for(let i=0; i<=9; i++) {
            chart.innerHTML += `<div style="flex:1; display:flex; flex-direction:column; align-items:center; height:100%; justify-content:flex-end;">
                <span id="v-${i}" style="font-size:8px">0%</span>
                <div id="b-${i}" class="bar"></div>
                <span style="font-weight:bold; font-size:10px">${i}</span>
            </div>`;
        }
    }
    initChart();

    function updateReportUI() {
        const wr = r_total > 0 ? ((r_wins / r_total) * 100).toFixed(1) : 0;
        const pf = r_brutoLoss > 0 ? (r_brutoWin / r_brutoLoss).toFixed(2) : r_brutoWin.toFixed(2);
        document.getElementById('rep-winrate').innerText = wr + "%";
        document.getElementById('rep-total').innerText = r_total;
        document.getElementById('rep-factor').innerText = pf;
        document.getElementById('rep-maxloss').innerText = r_maxLoss;
        document.getElementById('rep-vol').innerText = "$" + r_vol.toFixed(2);
    }

    function conectar() {
        const token = document.getElementById('inp-token').value;
        if(!token) return alert("Insira o Token");
        if(ws) ws.close();
        
        ws = new WebSocket('wss://ws.binaryws.com/websockets/v3?app_id=1089');
        
        ws.onopen = () => {
            ws.send(JSON.stringify({ authorize: token }));
            addLog("CONEXÃO ESTÁVEL", "var(--blue)");
        };

        ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            if(d.error) { 
                addLog("ERRO: " + d.error.message, "var(--red)");
                isProcessing = false;
                return;
            }

            if(d.msg_type === "authorize") {
                document.getElementById('btn-o').disabled = false;
                ws.send(JSON.stringify({ ticks: "1HZ100V", subscribe: 1 }));
                ws.send(JSON.stringify({ balance: 1, subscribe: 1 }));
            }

            if(d.msg_type === "balance") document.getElementById('banca').innerText = `$ ${d.balance.balance.toFixed(2)}`;

            if(d.msg_type === "tick") {
                const dig = parseInt(d.tick.quote.toString().slice(-1));
                document.getElementById('current-digit').innerText = dig;
                historico.push(dig); if(historico.length > 50) historico.shift();
                
                const cOdd = historico.filter(n => n % 2 !== 0).length;
                const cEven = historico.filter(n => n % 2 === 0).length;
                const pOdd = Math.round((cOdd/historico.length)*100);
                const pEven = Math.round((cEven/historico.length)*100);
                const fUser = parseInt(document.getElementById('inp-pct').value);

                // Auto-Switch
                if(!isProcessing) {
                    if(estrategia === "DIGITODD" && pEven >= fUser) toggleStrategy("DIGITEVEN");
                    else if(estrategia === "DIGITEVEN" && pOdd >= fUser) toggleStrategy("DIGITODD");
                }

                document.getElementById('pct').innerText = `${estrategia === "DIGITODD" ? pOdd : pEven}% ${estrategia.replace("DIGIT","")}`;

                // Atualiza Gráfico
                for(let i=0; i<=9; i++) {
                    let p = Math.round((historico.filter(n=>n===i).length/historico.length)*100) || 0;
                    const bar = document.getElementById(`b-${i}`);
                    if(bar) {
                        bar.style.height = (p*4) + "px";
                        document.getElementById(`v-${i}`).innerText = p + "%";
                        bar.style.background = ((estrategia === "DIGITODD" && i % 2 !== 0) || (estrategia === "DIGITEVEN" && i % 2 === 0)) ? "var(--green)" : "#333";
                    }
                }

                // Compra
                if(operando && !isProcessing) {
                    const cPct = (estrategia === "DIGITODD") ? pOdd : pEven;
                    if(aguardandoRecuperacao) {
                        if(cPct >= 70) { addLog("RECUPERANDO...", "var(--green)"); aguardandoRecuperacao = false; comprar(); }
                    } else if(cPct >= fUser) { comprar(); }
                }
            }

            if(d.msg_type === "proposal_open_contract" && d.proposal_open_contract.is_sold) {
                const c = d.proposal_open_contract;
                const res = parseFloat(c.profit);
                const lastD = c.exit_tick_display_value.slice(-1);
                
                r_total++; r_vol += parseFloat(c.buy_price);
                if(res > 0) {
                    profit += res; r_brutoWin += res; r_wins++; r_curLoss = 0; stake = initStake; 
                    aguardandoRecuperacao = false; addLog(`WIN ✅ (${lastD})`, "var(--green)");
                } else {
                    profit -= Math.abs(res); r_brutoLoss += Math.abs(res); losses++; r_curLoss++;
                    if(r_curLoss > r_maxLoss) r_maxLoss = r_curLoss;
                    stake = parseFloat((stake * 1.80).toFixed(2));
                    addLog(`LOSS ❌ (${lastD})`, "var(--red)");
                    if(r_curLoss >= 2) { aguardandoRecuperacao = true; addLog("FILTRO 70% ATIVADO", "var(--yellow)"); }
                }

                document.getElementById('lucro').innerText = `$ ${profit.toFixed(2)}`;
                document.getElementById('perdas').innerText = losses;
                document.getElementById('proxima').innerText = `$ ${stake.toFixed(2)}`;
                updateReportUI();

                const meta = parseFloat(document.getElementById('inp-goal').value);
                if(profit >= meta) { sessaoFinalizada("META 100%"); }
                else if(profit >= (meta * 0.7)) { sessaoFinalizada("META 70%"); }
                else if(profit <= -parseFloat(document.getElementById('inp-loss').value)) { sessaoFinalizada("STOP LOSS"); }
                else { isProcessing = false; }
            }

            if(d.msg_type === "buy" && !d.error) {
                ws.send(JSON.stringify({ proposal_open_contract: 1, contract_id: d.buy.contract_id, subscribe: 1 }));
            }
        };

        ws.onclose = () => { if(operando) setTimeout(conectar, 2000); };
    }

    function comprar() {
        if(!ws || ws.readyState !== 1) return;
        isProcessing = true;
        ws.send(JSON.stringify({buy: 1, price: stake, parameters: {amount: stake, basis: "stake", contract_type: estrategia, currency: "USD", duration: 1, duration_unit: "t", symbol: "1HZ100V"}}));
    }

    function iniciar() {
        operando = !operando;
        if(operando) {
            initStake = parseFloat(document.getElementById('inp-stake').value);
            stake = stake || initStake;
            if(!startTime) { startTime = new Date(); timerInterval = setInterval(() => {
                const diff = new Date(new Date() - startTime);
                document.getElementById('rep-time').innerText = diff.getUTCMinutes().toString().padStart(2,'0') + ":" + diff.getUTCSeconds().toString().padStart(2,'0');
            }, 1000); }
            addLog("BOT RODANDO", "var(--green)");
        }
        document.getElementById('btn-o').innerText = operando ? "PARAR" : "OPERAR";
        document.getElementById('btn-o').style.background = operando ? "var(--red)" : "var(--green)";
    }

    function sessaoFinalizada(m) {
        operando = false; isProcessing = true;
        clearInterval(timerInterval);
        document.getElementById('btn-o').innerText = "OPERAR";
        document.getElementById('btn-o').style.background = "var(--green)";
        addLog(m, "var(--yellow)");
        alert(m);
    }

    function resetTotal() {
        historico = []; profit = 0; losses = 0; r_total = 0; r_wins = 0; r_vol = 0; r_maxLoss = 0;
        document.getElementById('log-area').innerHTML = '';
        addLog("MEMÓRIA LIMPA", "#fff");
        updateReportUI();
    }
</script>
</body>
</html>
