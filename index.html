<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Deriv Bot 2.0 - PKCE Auth</title>
    <style>
        body { font-family: sans-serif; background: #15171a; color: white; text-align: center; padding: 50px; }
        .box { background: #1c1e22; padding: 30px; border-radius: 12px; display: inline-block; }
        button { background: #ff444f; color: white; border: none; padding: 15px 30px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #status { margin-top: 20px; color: #888; }
    </style>
</head>
<body>

<div class="box">
    <h2>Deriv Bot 2.0</h2>
    <p>Autenticação via OAuth2 + PKCE</p>
    <button id="btnLogin">Conectar via Deriv Login</button>
    <div id="status">Aguardando ação...</div>
</div>

<script>
    // Configurações do seu App no GitHub/Deriv
    const APP_ID = '33fc9mnRtBEDtNsLp4yh6'; // Substitua pelo seu ID registrado na Deriv
    const REDIRECT_URI = window.location.origin + window.location.pathname;

    async function iniciarLoginPKCE() {
        document.getElementById('status').innerText = "Gerando chaves de segurança...";

        // 1. Generate a random code_verifier
        const array = crypto.getRandomValues(new Uint8Array(64));
        const codeVerifier = Array.from(array)
            .map(v => 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~'[v % 66])
            .join('');

        // 2. Derive the code_challenge
        const hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(codeVerifier));
        const codeChallenge = btoa(String.fromCharCode(...new Uint8Array(hash)))
            .replace(/\+/g, '-')
            .replace(/\//g, '_')
            .replace(/=+$/, '');

        // 3. Generate a random state for CSRF protection
        const state = crypto.getRandomValues(new Uint8Array(16))
            .reduce((s, b) => s + b.toString(16).padStart(2, '0'), '');

        // 4. Store code_verifier and state before redirecting
        sessionStorage.setItem('pkce_code_verifier', codeVerifier);
        sessionStorage.setItem('oauth_state', state);

        // 5. Redirecionar para a Deriv
        const authUrl = `https://oauth.deriv.com/oauth2/authorize?app_id=${APP_ID}&code_challenge=${codeChallenge}&code_challenge_method=S256&state=${state}`;
        
        document.getElementById('status').innerText = "Redirecionando...";
        window.location.href = authUrl;
    }

    document.getElementById('btnLogin').onclick = iniciarLoginPKCE;

    // Lógica para capturar o retorno da Deriv após o login
    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('acct1')) {
            document.getElementById('status').innerText = "Login realizado com sucesso!";
            console.log("Tokens recebidos na URL:", window.location.search);
            // Aqui você capturaria o token 'token1' da URL para usar no WebSocket
        }
    };
</script>

</body>
</html>
